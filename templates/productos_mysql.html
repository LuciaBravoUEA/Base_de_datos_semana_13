<!DOCTYPE html>
<html>
<head>
    <title>Productos MySQL</title>
</head>

<body>

<h1>Gestión de Productos (MySQL)</h1>

<h2>Agregar Producto</h2>

<form action="/agregar_producto_mysql" method="POST">

Nombre del producto:<br>
<input type="text" name="nombre" required><br><br>

Precio:<br>
<input type="number" step="0.01" name="precio" required><br><br>

Cantidad:<br>
<input type="number" name="cantidad" required><br><br>

<button type="submit">Guardar Producto</button>

</form>

<hr>

<h2>Lista de Productos</h2>

<table border="1">

<tr>
<th>ID</th>
<th>Nombre</th>
<th>Precio</th>
<th>Cantidad</th>
<th>Acción</th>
</tr>

{% for p in productos %}

<tr>

<td>{{ p[0] }}</td>
<td>{{ p[1] }}</td>
<td>{{ p[2] }}</td>
<td>{{ p[3] }}</td>

<td>
<a href="/eliminar_producto_mysql/{{ p[0] }}">Eliminar</a>
</td>

</tr>

{% endfor %}

</table>

<br>

<a href="/">Volver al inicio</a>

</body>
</html>
